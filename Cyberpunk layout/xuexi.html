<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
    <title>音乐都市</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
            --bg-dark: #07070a;
            --bg-panel: #0e0e14;
            --panel-border: rgba(0, 243, 255, 0.08);
            --text-main: #e0e0e8;
            --text-dim: #6b6b8a;
            --font-mono: 'Courier New', Courier, 'SF Mono', Monaco, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.25);
            border-radius: 3px;
        }

        .sidebar {
            width: 420px;
            min-width: 340px;
            background: var(--bg-panel);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 22px;
            gap: 14px;
        }

        .top-bar {
            display: flex;
            position: relative;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.15);
            padding: 8px;
            margin-bottom: 2px;
        }

        .brand {
            font-size: 1.1rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.45);
            letter-spacing: 2px;
            font-weight: bold;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .brand-logo {
            height: 2.1em;
            width: auto;
            margin-right: 8px;
        }

        .glitch-text {
            position: relative;
            display: inline-block;
        }
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: transparent;
        }

        .brand:hover .glitch-text::before {
            animation: glitch-1 .3s infinite linear alternate-reverse;
            color: var(--neon-cyan);
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .brand:hover .glitch-text::after {
            animation: glitch-2 .3s infinite linear alternate-reverse;
            color: var(--neon-pink);
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }
        .badge {
            font-size: .65rem;
            color: var(--neon-pink);
            text-shadow: 0 0 4px rgba(255, 0, 255, 0.4);
            letter-spacing: 1px;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes glitch-2 {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(2px);
            }
        }

        @keyframes glitch-icon {
            0% {
                transform: translateX(0) translateY(0);
            }

            100% {
                transform: translateX(-1.5px) translateY(1.5px);
            }
        }

        .now-card {
            background-color: rgba(0, 243, 255, 0.04);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 10px;
            transition: .2s;
        }

        .now-card:hover {
            border-color: rgba(0, 243, 255, 0.35);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.08);
        }

        .vis {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
        }

        .vis i {
            display: block;
            width: 3px;
            background: var(--neon-cyan);
            border-radius: 2px;
            animation: vis .9s ease-in-out infinite;
        }

        .vis i:nth-child(1) {
            height: 40%;
            animation-delay: .0s;
        }

        .vis i:nth-child(2) {
            height: 70%;
            animation-delay: .15s;
        }

        .vis i:nth-child(3) {
            height: 50%;
            animation-delay: .3s;
        }

        .vis i:nth-child(4) {
            height: 90%;
            animation-delay: .05s;
        }

        #nowCard.paused .vis i {
            animation-play-state: paused;
            opacity: .3;
        }

        @keyframes vis {
            0%,100% {
                height: 20%;
            }
            50% {
                height: 100%;
            }
        }

        .now-mate {
            flex: 1;
            min-width: 0;
        }

        .now-title {
            font-size: .85rem;
            color: var(--neon-cyan);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .now-artist {
            font-size: .7rem;
            color: var(--text-dim);
            overflow: hidden;
            gap: 2px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .now-time {
            font-size: .7rem;
            color: var(--neon-pink);
            white-space: nowrap;
            margin-left: 6px;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, .25);
            border: 1px solid rgba(0, 243, 255, .12);
            border-radius: 8px;
            padding: 8px 10px;
        }

        .search-wrap:focus-within {
            border-color: rgba(0, 243, 255, .35);
        }

        #searchInp {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: .85rem;
        }

        .search-ico {
            color: var(--neon-cyan);
            font-size: .9rem;
        }

        #clearSearch {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: .8rem;
        }

        #clearSearch:hover {
            color: var(--neon-pink);
        }

        .dir-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .dir-chip{
            padding: 4px 10px;
            border: 1px solid rgba(0, 243, 255, .12);
            border-radius: 12px;
            font-size: .72rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: .2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .dir-chip:hover,
        .dir-chip.on {
            background: rgba(0, 243, 255, .08);
            color: var(--neon-cyan);
            border-color: rgba(0, 243, 255, .35);
            box-shadow: 0 0 8px rgba(0, 243, 255, .1);
        }
        .dir-chip .del {
            opacity: 0;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: var(--text-dim);
        }
        .dir-chip:hover .del {
            opacity: 1;
        }
        .dir-chip .del:hover {
            background: rgba(255, 0, 255, .15);
            color: var(--neon-pink);
        }
        .add-dir {
            background: none;
            border: 1px dashed rgba(0, 243, 255, .25);
            color: var(--neon-cyan);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            font-size: .9rem;
            line-height: 1;
        }

        .add-dir:hover {
            border-style: solid;
        }
        .drop-area>div:first-child {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .drop-area {
            border: 1px dashed rgba(0, 243, 255, .18);
            border-radius: 8px;
            padding: 14px 10px;
            text-align: center;
            font-size: .8rem;
            color: var(--text-dim);
            transition: .2s;
            position: relative;
        }

        .file-logo {
            height: 25px;
            width: auto;
            display: block;
        }

        .import-btns {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .import-btn {
            background: rgba(0, 243, 255, .05);
            border: 1px solid rgba(0, 243, 255, .2);
            color: var(--neon-cyan);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: .75rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        .import-btn:hover {
            background: rgba(0, 243, 255, .15);
            box-shadow: 0 0 10px rgba(0, 243, 255, .2);
        }

        .list-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .7rem;
            color: var(--neon-pink);
            padding: 0 4px;
        }

        .list-head span:last-child {
            color: var(--text-dim);
        }

        .scroll-list {
            flex: 1;
            display: flex;
            padding-right: 2px;
            gap: 3px;
            flex-direction: column;
            color: var(--neon-pink);
            overflow-y: auto;
        }
        .empty {
            text-align: center;
            padding: 30px;
            color: var(--text-dim);
            font-size: .85rem;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: .15s;
            position: relative;
        }

        .row:hover {
            background: rgba(0, 243, 255, .04);
            border-color: rgba(0, 243, 255, .08);
        }

        .row.on {
            background: rgba(0, 243, 255, .06);
            border-left: 2px solid var(--neon-cyan);
        }

        .row.on .num {
            color: var(--neon-cyan);
            text-shadow: 0 0 6px rgba(0, 243, 255, .4);
        }

        .row.on .t .title {
            color: var(--neon-cyan);
        }

        .num {
            width: 22px;
            font-size: .72rem;
            color: var(--text-dim);
            text-align: right;
        }

        .t {
            flex: 1;
            min-width: 0;
        }

        .t .title {
            font-size: .82rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-main);
        }

        .t .sub {
            font-size: .68rem;
            color: var(--text-dim);
            margin-top: 1px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dur {
            font-size: .72rem;
            color: var(--text-dim);
        }

        .acts {
            display: none;
            gap: 6px;
            margin-left: 6px;
        }

        .row:hover .acts {
            display: flex;
        }

        .acts button {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: .85rem;
            padding: 2px;
        }

        .acts button:hover {
            color: var(--neon-pink);
        }
        .main {
            display: flex;
            flex: 1;
            flex-direction: column;
            padding: 30px;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--bg-dark);
            background-image:
                linear-gradient(to bottom, rgba(7, 7, 10, 0.45), rgba(7, 7, 10, 0.75)),
                url('2.gif');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            box-shadow: inset 0 0 150px rgba(7, 7, 10, 0.9);
        }

        .sys-line {
            position: absolute;
            top: 15px;
            right: 10px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            opacity: .8;
        }

        .disc-box {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 36px;
        }

        .disc {
            height: 100%;
            width: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 243, 255, .35);
            box-shadow: 0 0 40px rgba(0, 243, 255, .15), inset 0 0 40px rgba(0, 0, 0, .6);
            animation: spin 24s linear infinite;
        }

        .disc.spin {
            animation-play-state: running;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .disc-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 1px solid rgba(0, 243, 255, .08);
            box-shadow: 0 0 60px rgba(0, 243, 255, .06);
            pointer-events: none;
        }

        .info {
            text-align: center;
            margin-bottom: 28px;
        }

        .info .h {
            font-size: 1.35rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .info .sub {
            font-size: .8rem;
            color: var(--text-dim);
            margin-top: 6px;
            letter-spacing: 1.5px;
        }

        .info .sub i {
            color: var(--neon-pink);
            font-style: normal;
            margin: 0 8px;
        }

        .prog {
            width: 100%;
            max-width: 520px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .prog .tm {
            font-size: .7rem;
            min-width: 36px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .bar-wrap {
            flex: 1;
            background: rgba(255, 255, 255, .06);
            height: 4px;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            position: relative;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            box-shadow: 0 0 8px rgba(0, 243, 255, .35);
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: -4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            opacity: 0;
            transition: .2s;
        }

        .bar-wrap:hover .bar-fill::after {
            opacity: 1;
        }

        .ctrls {
            display: flex;
            align-items: center;
            gap: 22px;
            margin-bottom: 18px;
        }

        .cbtn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.3rem;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: .2s;
            font-family: inherit;
        }

        .vol {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 260px;
        }

        .vol span {
            font-size: .75rem;
            color: var(--text-dim);
        }

        .vbar {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, .06);
            cursor: pointer;
            border-radius: 2px;
        }

        .vfill {
            height: 100%;
            width: 70%;
            background-color: var(--neon-cyan);
            border-radius: 2px;
        }

/* 弹出菜单容器 */
.pop {
    position: fixed;
    background: #12121a;           /* 稍亮的深色背景 */
    border: 1px solid rgba(0, 243, 255, 0.3);
    border-radius: 12px;
    padding: 8px 0;                /* 上下内边距，左右为0 */
    min-width: 140px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 243, 255, 0.1);
    backdrop-filter: blur(4px);    /* 可选：毛玻璃效果 */
    z-index: 1000;
    display: none;                /* 默认隐藏 */
}
.pop.show {
    display: flex;
}
/* 每个目录项 */
.pop-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    font-size: 0.8rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
}

/* 图标大小统一 */
.pop-item .file-logo {
    height: 18px;
    width: auto;
    opacity: 0.8;
}

/* 悬停效果 */
.pop-item:hover {
    background: rgba(0, 243, 255, 0.12);
    color: var(--neon-cyan);
    text-shadow: 0 0 4px rgba(0, 243, 255, 0.3);
}

/* 如果菜单出现在底部，可以加一个小三角（可选） */
.pop::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 12px;
    width: 12px;
    height: 12px;
    background: #12121a;
    border-left: 1px solid rgba(0, 243, 255, 0.3);
    border-top: 1px solid rgba(0, 243, 255, 0.3);
    transform: rotate(45deg);
    z-index: -1;
}
    </style>
</head>

<body>
    <audio id="audio"></audio>
    <!--左侧-->
    <div class="sidebar">
        <div class="top-bar">
            <div class="brand">
                <img src="图标3.png" alt="logo" class="brand-logo">
                <span class="glitch-text" data-text="音乐都市">音乐都市</span>
            </div>
            <div class="badge">在线</div>
        </div>
        <div class="now-card" id="nowCard">
            <div class="vis" id="viz"><i></i><i></i><i></i><i></i></div>
            <div class="now-mate">
                <div class="now-title" id="now-title">等待数据接入...</div>
                <div class="now-artist" id="now-artist">...</div>
            </div>
            <div class="now-time" id="now-time">0:00 / 0:00</div>
        </div>
        <div class="search-wrap">
            <span class="search-ico">⌕</span>
            <input type="text" id="searchInp" placeholder="检索神经音频..." autocomplete="off">
            <button id="clearSearch">✕</button>
        </div>
        <div class="dir-bar" id="dirBar"></div>

        <div class="drop-area" id="dropArea">
            <div><img src="file.png" alt="default" class="file-logo"> 拖拽音频文件至此</div>
            <div class="import-btns">
                <button class="import-btn" id="btnSelectFiles">添加单曲</button>
                <button class="import-btn" id="btnSelectDir">添加文件夹</button>
            </div>
            <input type="file" id="fileInp" multiple accept="audio/*" style="display: none">
            <input type="file" id="dirInp" multiple webkitdirectory style="display: none;">
        </div>
        <div class="list-head">
            <span>◉ 播放列表</span>
            <span id="listStat">0 首歌曲</span>
        </div>
        <div class="scroll-list" id="listBox">
            <div class="empty">等待神经连接</div>
        </div>
    </div>

    <!--右侧-->
    <div class="main">
        <div class="sys-line">NEURAL AUDIO SYSTEM</div>
        <!--唱片-->
        <div class="disc-box">
            <div class="disc-ring"></div>
            <img id="cover" class="disc spin" src="music.png" alt="Album Cover"></img>
        </div>
        <!--歌曲-->
        <div class="info">
            <div class="h" id="mainTitle">NO SIGNAL</div>
            <div class="sub" id="mainArtist">System Idle <i>//</i> SYNTHWAVE</div>
        </div>
        <!-- 进度条 -->
        <div class="prog">
            <span class="tm" id="curT"></span>
            <div class="bar-wrap" id="barWrap">
                <div class="bar-fill" id="barFill"></div>
            </div>
            <span class="tm" id="durT"></span>
        </div>
        <div class="ctrls">
            <button class="cbtn" id="btnShuffle">⇄</button>
            <button class="cbtn" id="btnPrev">◄◄</button>
            <button class="cbtn big" id="btnPlay">▶</button>
            <button class="cbtn" id="btnNext">►►</button>
            <button class="cbtn" id="btnLoop">↻</button>
        </div>
        <div class="vol">
            <span>◖</span>
            <div class="vbar" id="vbar">
                <div class="vfill" id="vfill"></div>
            </div>
            <span>◗</span>
        </div>
    </div>
    <div class="pop" id="popMune"></div>
    <script src="https://unpkg.com/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
    <script>
        //基础变量
        var library = [],dirs = [];
        var curDir = 'all';
        var kw = '';
        var curIdx = -1;
        var currentAudioUrl = null,currentCoverUrl = null;
        //状态变量
        var idbok = true;
        var mode = 'list';
        var isShuffle = false, isLoop = false;
        //DOM元素
        const audio = document.getElementById('audio');
        const defaultCover = 'music.png';
        function sig(f) {
            return `${f.name}_${f.size}`;
        }
        function parseName(fn) {
            var n = fn.replace(/\.(mp3|aac|flac|wav|ogg)$/i, '');
            if (n.includes(' - ')) {
                const p = n.split(' - ');
                return { artist: p[0].trim(), title: p.slice(1).join(' - ').trim() };
            }
            return { artist: '未知艺术家', title: n.trim() };
        }
        function esc(s) {
            return s ? s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;') : '';
        }
        function fmt(t) {
            if (isNaN(t)) return '00:00';
            const m = Math.floor(t / 60), s = Math.floor(t % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
        function filtered() {
            var f = [...library];
            if (curDir != 'all') {
                f = f.filter(s => s.directoryId === curDir);
            };
            if (kw.trim()) {
                const w = kw.trim().toLowerCase();
                f = f.filter(s => s.name.toLowerCase().includes(w) || s.artist.toLowerCase().includes(w))
            };
            return f;
        }
        function countDir(did) {
            return library.filter(s => s.directoryId === did).length;
        }
        //DB打开与后续处理的基础函数
        const dbname = 'CyberAudioDB', dbver = 2,song = 'songs',dir = 'dirs';
        function openDB() {
            return new Promise((resolve, reject) => {
                const r = indexedDB.open(dbname, dbver);
                r.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(song))
                    {
                        db.createObjectStore(song,{keyPath:'id'});
                    }
                    if (!db.objectStoreNames.contains(dir))
                    {
                        db.createObjectStore(dir,{keyPath: 'id'});
                    }
                };
                r.onsuccess = e => resolve(e.target.result);
                r.onerror = e => reject(e.target.error);
            }
            )
        }
        async function savesong(s) {
            const db = await openDB();
            return new Promise((resolve,reject) =>{
                const t = db.transaction(song,'readwrite');
                t.objectStore(song).put({
                    id: s.id,
                    signature: s.signature,
                    name: s.name,
                    artist: s.artist,
                    originalFileName: s.originalFileName,
                    directoryId: s.directoryId,
                    file: s.file
                })
                t.oncomplete = resolve;
                t.onerror = e => reject(e.target.error);
            }
            )    
        }
        async function loadSongs() {
            const db = await openDB();
            return new Promise((resolve,reject) => {
                const r = db.transaction(song,'readonly').objectStore(song).getAll();
                r.onsuccess = e => {
                const out = e.target.result.map(item =>({
                    id: item.id,
                    signature: item.signature || '',
                    name: item.name,
                    artist: item.artist,
                    originalFileName: item.originalFileName,
                    directoryId: item.directoryId,
                    file: item.file
                }));
                resolve(out);
            };
            r.onerror = e => reject(e.target.error);
            })
        }
        async function updateSongDir(id,dirId) {
            const db = await openDB();
            return new Promise((res,rej) =>
        {
            const t = db.transaction(song,'readwrite'),st = t.objectStore(song);
            const g = st.get(id);
           g.onsuccess = ()=> {
            const d = g.result;
            if(d)
           {
            d.directoryId = dirId;
            st.put(d);
           }
           res();
           };
           g.onerror = e =>rej(e.target.error);
        });
        }
        async function delSong(id) {
            const db = await openDB();
            return new Promise((res,rej) =>
        {
            const t = db.transaction(song,'readwrite');
            t.objectStore(song).delete(id);
            t.oncomplete = res;
            t.onerror = e => rej(e.target.error);
        });
        }
        async function saveDirs(dirs) {
            const db = await openDB();
            return new Promise((res,rej) =>
        {
            const t = db.transaction(dir,'readwrite');
            const st = t.objectStore(dir);
            st.clear();
            dirs.forEach(d => {
                st.put(d);
            });
            t.oncomplete = res;
            t.onerror = e => rej(e.target.error);
        });
        }
        async function loadDirs() {
            const db = await openDB();
            return new Promise((res,rej) =>
        {
            const t = db.transaction(dir,'readonly');
            const st = t.objectStore(dir);
            const req = st.getAll();
            req.onsuccess = e => res(e.target.result);
            req.onerror = e => rej(e.target.error);
        });
        }
        //封面提取函数
        function extractCover(file)
        {
            return new Promise((resolve) =>
                {
                    if(typeof jsmediatags === 'undefined')
                {
                    resolve(null);
                    return;
                }
                jsmediatags.read(file,{
                    onSuccess: (tag) =>
                {
                    if(tag.tags && tag.tags.picture)
                    {
                        const pic = tag.tags.picture;
                        const blob = new Blob([new Uint8Array(pic.data)], { type: pic.format });
                        resolve(URL.createObjectURL(blob));
                    } else{
                        resolve(null);
                    }
                },
                onError: () => resolve(null)
                })
                }
            );
        }
        //网页ui渲染函数
        function renderDirs()
        {
            var html = `<div class = "dir-chip ${curDir === 'all' ? 'on' : ''}" data-d = "all"> <img src="file.png" alt="default" class="file-logo">全部<span style="opacity:.7">${library.length}</span></div>`;
            dirs.forEach(d =>
                {
                    const c = countDir(d.id);
                    html += `<div class="dir-chip ${curDir === d.id ? 'on' : ''}" data-d="${d.id}"><img src="file.png" class="file-logo">${esc(d.name)}<span style="opacity:.7">${c}</span>${d.id !== 'default' ? `<span class="del" data-del="${d.id}">✖</span>` : ''}</div>`;
                }
            );
            html += `<button class="add-dir" id="addDir">+</button>`;
            document.getElementById('dirBar').innerHTML = html;
        }
    //播放模式应用
        const btnShuffle = document.getElementById('btnShuffle');
        const btnLoop = document.getElementById('btnLoop');
        function applyMode()
        {
            isShuffle = false;
            isLoop = false;
            if(mode === 'random'){
                isShuffle = true;
            }
            else if(mode === 'loop'){
                isLoop = true;
            }
            btnShuffle.classList.toggle('on', isShuffle);
            btnLoop.classList.toggle('on', isLoop);
        }
    //播放模式函数
        document.getElementById('btnPlay').addEventListener('click', togglePlay);
        document.getElementById('btnNext').addEventListener('click', next);
        document.getElementById('btnPrev').addEventListener('click', prev);
        document.getElementById('nowCard').addEventListener('click', () => playByIndex(curIdx));
        btnShuffle.addEventListener('click', () => {
            mode = mode === 'random' ? 'list' : 'random';
            applyMode();
            saveState();
        });
        btnLoop.addEventListener('click', () => {
            mode = mode === 'loop' ? 'list' : 'loop';
            applyMode();
            saveState();
        });
    //列表渲染函数
        function renderList()
        {
            const f = filtered();
            const box = document.getElementById('listBox');
            document.getElementById('listStat').textContent = `${f.length} 首曲目`;

            if(!f.length)
        {
            box.innerHTML = '<div class="empty">该目录下无神经信号</div>';
            return;
        }
        var h = '';
        f.forEach((s,idx) =>
    {
        const gidx = library.findIndex(x => x.id === s.id);
        const active = gidx === curIdx;
        const dname = curDir === 'all' ? (dirs.find(d => d.id === s.directoryId)?.name || '未分类') : '';
        h += `<div class = "row ${active ? 'on' : ''}" data-g ="${gidx}" data-id= "${s.id}">
            <div class="num">${idx + 1}</div>
            <div class="t">
            <div class="title">${esc(s.name)}</div>
            <div class="sub">${esc(s.artist)}${dname ? ' · ' + esc(dname) : ''}</div>
            </div>
            <div class="acts">
                <button class="mv" title="移动"><img src="file.png" alt="default" class="file-logo"></button>
                <button class="rm" title="删除">🗑</button>
            </div>
        </div>`;
    });
        box.innerHTML = h;
        }

    //播放核心函数等等
    async function playByIndex(i) {
        if(!library.length) return;
        if(i<0) i = 0;
        if(i >= library.length) i = library.length -1;
        const song = library[i];
        if(!song || !song.file) return;
        
        if(currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
        currentAudioUrl = URL.createObjectURL(song.file);
        audio.src = currentAudioUrl;

        document.getElementById('mainTitle').textContent = esc(song.name);
        document.getElementById('mainArtist').textContent = esc(song.artist);
        document.getElementById('now-title').textContent = esc(song.name);
        document.getElementById('now-artist').textContent = esc(song.artist);

        curIdx = i;

         const coverEl = document.getElementById('cover');
        coverEl.src = defaultCover;
        if (currentCoverUrl) {
            URL.revokeObjectURL(currentCoverUrl);
            currentCoverUrl = null;
            }
        extractCover(song.file).then(coverUrl => {
            if(curIdx === i && coverUrl)
        {
            currentCoverUrl = coverUrl;
            coverEl.src = coverUrl;
        }
        else if(coverUrl)
        {
            URL.revokeObjectURL(coverUrl);
        }
        });
        await audio.play().catch(e => console.log('播放失败',e));
        updatePlayBtn();
        renderList();
        saveState();
    }
    function updateStat()
    {
        document.getElementById('listStat').textContent = `${filtered().length} 首曲目`;
    }
    //存储和重现函数
    function saveState()
    {
        localStorage.setItem('cyber_mode', mode);
        localStorage.setItem('cyber_idx', curIdx);
        localStorage.setItem('cyber_vol', audio.volume);
    }
    function restoreState()
    {
        const mode_past = localStorage.getItem('cyber_mode');
        if(mode_past) 
        {  
            mode = mode_past;
            applyMode(mode);
        }
        const idx = parseInt(localStorage.getItem('cyber_idx'));
        if(!isNaN(idx) && idx >= 0 && idx < library.length)
        {
            const s = library[idx];
            document.getElementById('mainTitle').textContent = esc(s.name);
            document.getElementById('mainArtist').textContent = esc(s.artist);
            document.getElementById('now-title').textContent = esc(s.name);
            document.getElementById('now-artist').textContent = esc(s.artist);
            curIdx = idx;
            renderList();
        }
        const vol = parseFloat(localStorage.getItem('cyber_vol'));
        {
            audio.volume = parseFloat(vol);
            const vfill = document.getElementById('vfill');
            if (vfill) vfill.style.width = (audio.volume * 100) + '%';
        }
    }

    //ui交互事件绑定
        document.getElementById('dirBar').addEventListener('click',e=>{
        const del = e.target.closest('.del');
        const iron = e.target.closest('.dir-chip');
        const adddirs = e.target.closest('#addDir');
        if(del)
        {
            delDir(del.dataset.del);
        }
        else if(iron)
        {
            curDir = iron.dataset.d;
            kw = '';
            document.getElementById('searchInp').value = '';
            renderDirs();
            renderList();
            updateStat();
        }
        else if(adddirs)
        {
            const n = prompt('新目录名称');
            if (!n || !n.trim()) return;
            if(dirs.some(d => d.name === n.trim())) return alert('该目录已存在');
            dirs.push({id: 'dir_' + Date.now(), name: n.trim() });
            saveDirs(dirs);
            renderDirs();
        }
        });
        //audio事件绑定
        audio.addEventListener('play', updatePlayBtn);
        audio.addEventListener('pause', updatePlayBtn);
        function updatePlayBtn()
        {
            const btn = document.getElementById('btnPlay');
            const disc = document.getElementById('cover');
            const viz = document.getElementById('viz');
            if (audio.paused) {
                btn.innerHTML = '▶';
                disc.classList.remove('spin');
                viz.classList.add('paused');
            } else {
                btn.innerHTML = '⏸';
                disc.classList.add('spin');
                viz.classList.remove('paused');
            }
        }
        audio.addEventListener('ended', () => {
            if(isLoop)
        {
            if(curIdx >= 0) playByIndex(curIdx);
        }else{
            next();
        }
    });
        audio.addEventListener('play', updatePlayBtn);
        audio.addEventListener('pause', updatePlayBtn);
        audio.addEventListener('timeupdate',()=>
    {
        if(audio.duration){
            document.getElementById('curT').textContent = fmt(audio.currentTime);
            document.getElementById('durT').textContent = fmt(audio.duration);
            document.getElementById('barFill').style.width = ((audio.currentTime / audio.duration) * 100) + '%';
            document.getElementById('now-time').textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
        }
    });
    //点击左侧歌曲栏播放
    document.getElementById('listBox').addEventListener('click',e=>{
        const row = e.target.closest('.row');
        if(!row) return;
        const mvBtn = e.target.closest('.mv');
        const rmBtn = e.target.closest('.rm');
        const songId = row.dataset.id;
        const gIdx = parseInt(row.dataset.g);
        if(mvBtn)
    {
        const pop = document.getElementById('popMune');
        pop.innerHTML = dirs.map(d => `<div class="pop-item" data-id="${d.id}"><img src="file.png" alt="default" class="file-logo"> ${esc(d.name)}</div>`).join('');
        pop.onclick = async (ev) => {
            const item = ev.target.closest('.pop-item');
            if(!item) return;
            const song = library.find(s => s.id === songId);
            if(song)
        {
            song.directoryId = item.dataset.id;
            await updateSongDir(song.id, item.dataset.id);
        }
        pop.classList.remove('show');
        renderDirs();
        renderList();
        updateStat();
        };
        const rect = mvBtn.getBoundingClientRect();
        pop.style.top = rect.top + 'px';
        pop.style.left = rect.right +  + 'px';
        pop.classList.add('show');
    }else if(rmBtn){
        delsingle(songId);
    }
    else{
        playByIndex(gIdx);
    }
});

    //前后首操作button事件绑定
        document.getElementById('btnPlay').addEventListener('click', togglePlay);
        document.getElementById('btnNext').addEventListener('click', next);
        document.getElementById('btnPrev').addEventListener('click', prev);
        function togglePlay()
        {
            if(!audio.src)
        {
            if(library.length)
            {
                playByIndex(0);
            }
            return;
        }
            if(audio.paused){
                audio.play();
            }
            else{
                audio.pause();
            }
        }
    
        function next()
        {
            const f = filtered();
            if(!f.length) return;
            const cid = library[curIdx]?.id;
            let cidx = f.findIndex(x => x.id === cid);
            if (cidx === -1) cidx = 0;
            var nidx;
            if(isShuffle){
                nidx = Math.floor(Math.random() * f.length);
            }
            else if(isLoop)
            {
                nidx = cidx;
            }
            else{
                nidx = cidx + 1;
                if(nidx >= f.length) nidx = 0;
            }
            const ns = f[nidx];
            if (ns) playByIndex(library.findIndex(x => x.id === ns.id));
        }
        function prev(){
            const f = filtered();
            if(!f.length) return;
            const cid = library[curIdx]?.id;

            let cidx = f.findIndex(x => x.id === cid);
            if (cidx === -1) cidx = 1;

            const pidx = (cidx - 1 + f.length) % f.length;
            const ps = f[pidx];
            if (ps) playByIndex(library.findIndex(x => x.id === ps.id));
        }
    //导入与删除操作
    function addFiles(files){
        const vaild = Array.from(files).filter(f => f.type.includes('audio') ||  /\.(mp3|aac|flac|wav|ogg)$/i.test(f.name));
        if(!vaild.length) return;
        var skip = 0;
        const target = curDir === 'all' ? 'default' : curDir;
        for(const file of vaild)
        {
            // 处理每个有效的音频文件
            const s = sig(file);
            if(library.some(x => x.signature === s)){skip++; continue;}

            const {artist,title} = parseName(file.name);

            const song = {
                id: String(Date.now() + Math.random()),
                signature: s,
                name: title,
                artist,
                file,
                originalFileName: file.name,
                directoryId: target
            };
            library.push(song);
            if(idbok) savesong(song);
        }
        if(library.length > 0 && curIdx === -1)
        {
            document.getElementById('mainTitle').textContent = esc(library[0].name);
            document.getElementById('mainArtist').textContent = esc(library[0].artist);
            document.getElementById('now-title').textContent = esc(library[0].name);
            document.getElementById('now-artist').textContent = esc(library[0].artist);
        }
        renderDirs();
        renderList();
        updateStat();
    }
    function delsingle(id){
        if(!confirm('确定要删除这条神经信号吗？')) return;
        const idx = library.findIndex(s => s.id === id);
        if(idx === -1) return;
        const was = curIdx === idx;

        library.splice(idx,1);
        if(idbok) delSong(id);

        if(was)
    {
        audio.pause();
        audio.src = '';
        if (currentAudioUrl) { URL.revokeObjectURL(currentAudioUrl); currentAudioUrl = null; }
        if (currentCoverUrl) { URL.revokeObjectURL(currentCoverUrl); currentCoverUrl = null; }

        curIdx = -1;
        document.getElementById('mainTitle').textContent = 'NO SIGNAL';
        document.getElementById('mainArtist').textContent = 'System Idle';
        document.getElementById('now-title').textContent = '等待数据接入...';
        document.getElementById('now-artist').textContent = '--';
        document.getElementById('now-time').textContent = '0:00 / 0:00';
        document.getElementById('barFill').style.width = '0%';
        document.getElementById('cover').src = defaultCover;
        updatePlayBtn();
        } else if (curIdx > idx) {
            curIdx--;
        }
        saveState();
        renderDirs();
        renderList();
        updateStat();
    }
    async function delDir(id)
    {
        if(id === 'default') return alert('无法删除[未分类]'); 
        if(!confirm('删除目录？神经信号将被移至[未分类]')) return; 
        for(const s of library.filter(s => s.directoryId === id))
        {
            s.directoryId = 'default';
            if(idbok) await updateSongDir(s.id,'default');
        }
          dirs = dirs.filter(d => d.id !== id);
            if(curDir === id) {
                curDir = 'default';
                document.getElementById('searchInp').value = '';
                kw = '';
            }
        await saveDirs(dirs);
        renderDirs();
        renderList();
        updateStat();
    }
    //droparea所有事件绑定
    const dropArea = document.getElementById('dropArea');
    document.getElementById('btnSelectFiles').addEventListener('click',e => {
        e.stopPropagation();
        document.getElementById('fileInp').click();
    });
    document.getElementById('btnSelectDir').addEventListener('click', e => {
        e.stopPropagation();
        document.getElementById('dirInp').click();
    });
    document.getElementById('fileInp').addEventListener('change', e => {
        if(e.target.files) addFiles(e.target.files);
        e.target.value = '';
    });
    document.getElementById('dirInp').addEventListener('change', e => {
        if (e.target.files) addFiles(e.target.files);
        e.target.value = '';
    });
    dropArea.addEventListener('dragover', e => {
        e.preventDefault();
        dropArea.classList.add('dragover');
    });

    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));

    dropArea.addEventListener('drop', e => {
        e.preventDefault();
        dropArea.classList.remove('dragover');
        if (e.dataTransfer.files) addFiles(e.dataTransfer.files);
    });
    //进度条事件绑定
document.getElementById('barWrap').addEventListener('click', e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    if (audio.duration) audio.currentTime = percent * audio.duration;
});
//音量条事件绑定
document.getElementById('vbar').addEventListener('click', e => {
    const rect = e.currentTarget.getBoundingClientRect();
    let vol = (e.clientX - rect.left) / rect.width;
    vol = Math.min(1, Math.max(0, vol));
    audio.volume = vol;
    document.getElementById('vfill').style.width = (vol * 100) + '%';
});
//搜索框清除事件绑定
document.getElementById('clearSearch').addEventListener('click', () => {
    document.getElementById('searchInp').value = '';
    kw = '';
    renderList();
    updateStat();
});
//搜索框输入事件绑定
document.getElementById('searchInp').addEventListener('input', e => {
    kw = e.target.value;
    renderList();
    updateStat();
});
//弹出菜单事件绑定
document.addEventListener('click', (e) => {
    const pop = document.getElementById('popMune');
    if (pop.classList.contains('show') && !e.target.closest('.mv') && !e.target.closest('.pop')) {
        pop.classList.remove('show');
    }
});



    async function init() {
        if(!window.indexedDB) idbok = false;
        try{
            library = await loadSongs();
            const ds = await loadDirs();
            dirs = ds.length ? ds : [{ id: 'default', name: '未分类' }];
            if (!ds.length) await saveDirs(dirs);
            renderDirs();
            renderList();
            updateStat();
            restoreState();
        }
        catch(e)
        {
            console.warn('IndexdB 错误',e);
            idbok = false;
            dirs = [{id: 'default',name: '未分类'}];
            renderDirs();
            renderList();
        }
        if (curIdx < 0) {
        document.getElementById('mainTitle').textContent = 'NO SIGNAL';
        document.getElementById('mainArtist').textContent = 'System Idle';
        document.getElementById('cover').src = defaultCover;
        }
        const vfill = document.getElementById('vfill');
        if (vfill) vfill.style.width = (audio.volume * 100) + '%';
    }
    window.addEventListener('load', init);
    window.addEventListener('beforeunload', () => {
    saveState();
    });

    </script>
