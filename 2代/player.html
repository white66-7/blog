<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>本地音乐海 · 播放器</title>
    <style>
        /* 样式与前文完全一致，此处省略 */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f8fafc 0%, #eff3f6 100%);
            min-height: 100vh; color: #0f172a; padding: 24px 20px 40px 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .app-container { max-width: 600px; width: 100%; margin: 0 auto; }
        .hero { text-align: center; margin-bottom: 24px; }
        .hero h1 { font-size: 1.8rem; background: linear-gradient(135deg, #3b82f6, #9333ea); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px; }
        .back-link { display: inline-block; margin-top: 8px; font-size: 0.8rem; color: #3b82f6; text-decoration: none; background: rgba(255,255,255,0.6); padding: 4px 12px; border-radius: 20px; transition: background 0.2s; }
        .back-link:hover { background: white; }
        .player-panel { background: white; border-radius: 40px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); border: 1px solid #eef2ff; backdrop-filter: blur(2px); overflow: hidden; }
        .now-playing-card { padding: 32px 24px; text-align: center; }
        .album-art { width: 180px; height: 180px; background: linear-gradient(145deg, #d9e2ef, #cbd5e6); border-radius: 40px; margin: 0 auto 24px auto; display: flex; align-items: center; justify-content: center; font-size: 4.5rem; box-shadow: 0 12px 25px rgba(0,0,0,0.15); transition: 0.2s; }
        .track-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: #5b6e8c; font-size: 0.95rem; margin-bottom: 20px; }
        audio { width: 100%; margin: 16px 0 12px; border-radius: 40px; }
        .control-buttons { display: flex; justify-content: center; gap: 32px; margin: 20px 0 16px; }
        .ctrl-btn { background: #f1f5f9; border: none; width: 56px; height: 56px; border-radius: 60px; font-size: 1.8rem; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; color: #1e293b; }
        .ctrl-btn:hover { background: #e2e8f0; transform: scale(1.02); }
        .ctrl-btn.primary { background: #3b82f6; color: white; box-shadow: 0 6px 14px rgba(59,130,246,0.4); }
        .mode-selector { margin: 12px 0 8px; display: flex; justify-content: center; gap: 16px; }
        .mode-badge { font-size: 0.8rem; background: #eef2ff; padding: 6px 16px; border-radius: 30px; cursor: pointer; transition: 0.1s; font-weight: 500; }
        .mode-badge.active-mode { background: #3b82f6; color: white; }
        .footer-note { margin-top: 20px; font-size: 0.7rem; text-align: center; padding: 20px; color: #6c7a91; border-top: 1px solid #edf2f7; }
        @media (max-width: 550px) {
            .album-art { width: 140px; height: 140px; font-size: 3.5rem; }
            .track-title { font-size: 1.2rem; }
            .ctrl-btn { width: 48px; height: 48px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="hero">
        <h1>🎧 正在播放</h1>
        <!-- ✅ 修改返回链接为 song-library.html -->
        <a href="song-library.html" class="back-link" id="backLink">← 返回曲库</a>
    </div>
    <div class="player-panel">
        <div class="now-playing-card">
            <div class="album-art" id="albumArt">🎼</div>
            <div class="track-title" id="nowTitle">未选择歌曲</div>
            <div class="track-artist" id="nowArtist">—</div>
            <audio id="audioPlayer" controls preload="auto" style="width:100%"></audio>
            <div class="control-buttons">
                <button class="ctrl-btn" id="prevBtn" title="上一首">⏮</button>
                <button class="ctrl-btn primary" id="playPauseBtn" title="播放/暂停">▶</button>
                <button class="ctrl-btn" id="nextBtn" title="下一首">⏭</button>
            </div>
            <div class="mode-selector">
                <div class="mode-badge" data-mode="list">📃 顺序</div>
                <div class="mode-badge" data-mode="random">🎲 随机</div>
                <div class="mode-badge" data-mode="loop">🔁 单曲循环</div>
            </div>
        </div>
        <div class="footer-note">💡 返回曲库时会保留当前进度</div>
    </div>
</div>

<script>
    const DB_NAME = 'MusicOceanDB', DB_VERSION = 2, SONGS_STORE = 'songs', DIRS_STORE = 'directories';
    let indexedDBAvailable = true;

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(SONGS_STORE)) db.createObjectStore(SONGS_STORE, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(DIRS_STORE)) db.createObjectStore(DIRS_STORE, { keyPath: 'id' });
            };
            req.onsuccess = e => resolve(e.target.result);
            req.onerror = e => reject(e.target.error);
        });
    }

    async function loadAllSongsFromDB() {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const req = db.transaction(SONGS_STORE, 'readonly').objectStore(SONGS_STORE).getAll();
            req.onsuccess = e => {
                const songs = e.target.result.map(item => {
                    const fileObj = item.file;
                    const url = URL.createObjectURL(fileObj);
                    return {
                        id: item.id, signature: item.signature || '', name: item.name, artist: item.artist,
                        originalFileName: item.originalFileName, directoryId: item.directoryId || 'default',
                        src: url, file: fileObj
                    };
                });
                resolve(songs);
            };
            req.onerror = e => reject(e.target.error);
        });
    }

    let musicLibrary = [], currentPlayIndex = -1, playMode = 'list';
    const audio = document.getElementById('audioPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const nowTitle = document.getElementById('nowTitle');
    const nowArtist = document.getElementById('nowArtist');
    const backLink = document.getElementById('backLink');

    function getSongIdFromUrl() {
        return new URLSearchParams(window.location.search).get('songId');
    }

    function playSongByIndex(index) {
        if (!musicLibrary.length) return;
        if (index < 0) index = 0;
        if (index >= musicLibrary.length) index = musicLibrary.length - 1;
        const song = musicLibrary[index];
        if (!song?.src) return;
        audio.src = song.src;
        nowTitle.innerText = song.name;
        nowArtist.innerText = song.artist;
        audio.play().catch(() => {});
        currentPlayIndex = index;
        playPauseBtn.innerHTML = '⏸';
        savePlayerState();
    }

    function nextSong() {
        if (!musicLibrary.length) return;
        let next;
        if (playMode === 'random') next = Math.floor(Math.random() * musicLibrary.length);
        else if (playMode === 'loop') next = currentPlayIndex;
        else next = (currentPlayIndex + 1) % musicLibrary.length;
        playSongByIndex(next);
    }

    function prevSong() {
        if (!musicLibrary.length) return;
        playSongByIndex((currentPlayIndex - 1 + musicLibrary.length) % musicLibrary.length);
    }

    audio.addEventListener('ended', () => {
        if (playMode === 'loop') playSongByIndex(currentPlayIndex);
        else nextSong();
    });

    function setMode(mode) {
        playMode = mode;
        document.querySelectorAll('.mode-badge').forEach(b => b.classList.toggle('active-mode', b.dataset.mode === mode));
        savePlayerState();
    }

    function savePlayerState() {
        localStorage.setItem('play_mode', playMode);
        localStorage.setItem('last_index', currentPlayIndex);
    }

    function loadPlayerState() {
        const mode = localStorage.getItem('play_mode');
        if (mode) setMode(mode);
    }

    async function initPlayer() {
        if (!window.indexedDB) { nowTitle.innerText = '数据库不可用'; return; }
        try {
            musicLibrary = await loadAllSongsFromDB();
            if (!musicLibrary.length) { nowTitle.innerText = '暂无歌曲'; nowArtist.innerText = '请先添加歌曲'; return; }

            const songIdUrl = getSongIdFromUrl();
            let targetIndex = -1;
            if (songIdUrl) targetIndex = musicLibrary.findIndex(s => s.id === songIdUrl);
            if (targetIndex === -1) targetIndex = 0;

            playSongByIndex(targetIndex);

            // 尝试读取从主页传来的进度（由主页面 jumpToPlayer 存入）
            const savedTime = localStorage.getItem('music_return_time');
            const savedSongId = localStorage.getItem('music_return_song_id');
            if (savedSongId && musicLibrary[targetIndex].id === savedSongId && savedTime && !isNaN(parseFloat(savedTime))) {
                audio.addEventListener('loadedmetadata', function setTime() {
                    audio.currentTime = parseFloat(savedTime);
                    audio.removeEventListener('loadedmetadata', setTime);
                }, { once: true });
                // 清理，避免下次误用
                localStorage.removeItem('music_return_time');
                localStorage.removeItem('music_return_song_id');
            }

            loadPlayerState();
        } catch (err) { console.error(err); nowTitle.innerText = '加载失败'; }
    }

    // 控件事件
    playPauseBtn.addEventListener('click', () => {
        if (audio.paused) { audio.play(); playPauseBtn.innerHTML = '⏸'; }
        else { audio.pause(); playPauseBtn.innerHTML = '▶'; }
    });
    audio.addEventListener('play', () => playPauseBtn.innerHTML = '⏸');
    audio.addEventListener('pause', () => playPauseBtn.innerHTML = '▶');
    document.getElementById('prevBtn').addEventListener('click', prevSong);
    document.getElementById('nextBtn').addEventListener('click', nextSong);
    document.querySelectorAll('.mode-badge').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
    
    // ✅ 修改返回按钮的跳转地址
    backLink.addEventListener('click', e => {
        e.preventDefault();
        if (currentPlayIndex >= 0 && musicLibrary[currentPlayIndex]) {
            localStorage.setItem('music_return_song_id', musicLibrary[currentPlayIndex].id);
            localStorage.setItem('music_return_time', audio.currentTime);
        }
        window.location.href = 'song-library.html';   // 👈 这里改为 song-library.html
    });

    window.addEventListener('load', initPlayer);
</script>
</body>
</html>
