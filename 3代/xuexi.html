<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
    <title>音乐都市</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
            --bg-dark: #07070a;
            --bg-panel: #0e0e14;
            --panel-border: rgba(0, 243, 255, 0.08);
            --text-main: #e0e0e8;
            --text-dim: #6b6b8a;
            --font-mono: 'Courier New', Courier, 'SF Mono', Monaco, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.25);
            border-radius: 3px;
        }

        .sidebar {
            width: 420px;
            min-width: 340px;
            background: var(--bg-panel);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 22px;
            gap: 14px;
        }

        .top-bar {
            display: flex;
            position: relative;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.15);
            padding: 8px;
            margin-bottom: 2px;
        }

        .brand {
            font-size: 1.1rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.45);
            letter-spacing: 2px;
            font-weight: bold;
            display: flex;
            align-items: center;
            cursor: pointer;
            /* 加个小手指，提示可交互 */
        }

        /* 2. 图标变大 + 发光特效 + 悬停小震动 */
        .brand-logo {
            height: 2.1em;
            width: auto;
            margin-right: 8px;
        }

        /* 3. 文字容器定位 */
        .glitch-text {
            position: relative;
            display: inline-block;
        }

        /* 文字故障伪元素 */
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: transparent;
        }

        /* 【关键修复】现在只要鼠标放在 .brand（包含图标和字）上，字就会开始闪！ */
        .brand:hover .glitch-text::before {
            animation: glitch-1 .3s infinite linear alternate-reverse;
            color: var(--neon-cyan);
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .brand:hover .glitch-text::after {
            animation: glitch-2 .3s infinite linear alternate-reverse;
            color: var(--neon-pink);
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }
        .badge {
            font-size: .65rem;
            color: var(--neon-pink);
            text-shadow: 0 0 4px rgba(255, 0, 255, 0.4);
            letter-spacing: 1px;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes glitch-2 {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(2px);
            }
        }

        @keyframes glitch-icon {
            0% {
                transform: translateX(0) translateY(0);
            }

            100% {
                transform: translateX(-1.5px) translateY(1.5px);
            }
        }

        .now-card {
            background-color: rgba(0, 243, 255, 0.04);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 10px;
            transition: .2s;
        }

        .now-card:hover {
            border-color: rgba(0, 243, 255, 0.35);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.08);
        }

        .vis {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
        }

        .vis i {
            display: block;
            width: 3px;
            background: var(--neon-cyan);
            border-radius: 2px;
            animation: vis .9s ease-in-out infinite;
        }

        .vis i:nth-child(1) {
            height: 40%;
            animation-delay: .0s;
        }

        .vis i:nth-child(2) {
            height: 70%;
            animation-delay: .15s;
        }

        .vis i:nth-child(3) {
            height: 50%;
            animation-delay: .3s;
        }

        .vis i:nth-child(4) {
            height: 90%;
            animation-delay: .05s;
        }

        .paused .vis i {
            animation-play-state: paused;
            opacity: .3;
        }

        @keyframes vis {

            0%,
            100% {
                height: 20%;
            }

            50% {
                height: 100%;
            }
        }

        .now-mate {
            flex: 1;
            min-width: 0;
        }

        .now-title {
            font-size: .85rem;
            color: var(--neon-cyan);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .now-artist {
            font-size: .7rem;
            color: var(--text-dim);
            overflow: hidden;
            gap: 2px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .now-time {
            font-size: .7rem;
            color: var(--neon-pink);
            white-space: nowrap;
            margin-left: 6px;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, .25);
            border: 1px solid rgba(0, 243, 255, .12);
            border-radius: 8px;
            padding: 8px 10px;
        }

        .search-wrap:focus-within {
            border-color: rgba(0, 243, 255, .35);
        }

        #searchInp {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: .85rem;
        }

        .search-ico {
            color: var(--neon-cyan);
            font-size: .9rem;
        }

        #clearSearch {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: .8rem;
        }

        #clearSearch:hover {
            color: var(--neon-pink);
        }

        .dir-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .drop-area>div:first-child {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .drop-area {
            border: 1px dashed rgba(0, 243, 255, .18);
            border-radius: 8px;
            padding: 14px 10px;
            text-align: center;
            font-size: .8rem;
            color: var(--text-dim);
            transition: .2s;
            position: relative;
        }

        .file-logo {
            height: 25px;
            width: auto;
            display: block;
        }

        .import-btns {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .import-btn {
            background: rgba(0, 243, 255, .05);
            border: 1px solid rgba(0, 243, 255, .2);
            color: var(--neon-cyan);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: .75rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        .import-btn:hover {
            background: rgba(0, 243, 255, .15);
            box-shadow: 0 0 10px rgba(0, 243, 255, .2);
        }

        .list-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .7rem;
            color: var(--neon-pink);
            padding: 0 4px;
        }

        .list-head span:last-child {
            color: var(--text-dim);
        }

        .scroll-list {
            flex: 1;
            display: flex;
            padding-right: 2px;
            gap: 3px;
            flex-direction: column;
            color: var(--neon-pink);
            overflow-y: auto;
        }

        .main {
            display: flex;
            flex: 1;
            flex-direction: column;
            padding: 30px;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--bg-dark);
            background-image:
                linear-gradient(to bottom, rgba(7, 7, 10, 0.45), rgba(7, 7, 10, 0.75)),
                url('2.gif');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            box-shadow: inset 0 0 150px rgba(7, 7, 10, 0.9);
        }

        .sys-line {
            position: absolute;
            top: 15px;
            right: 10px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            opacity: .8;
        }

        .disc-box {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 36px;
        }

        .disc {
            height: 100%;
            width: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 243, 255, .35);
            box-shadow: 0 0 40px rgba(0, 243, 255, .15), inset 0 0 40px rgba(0, 0, 0, .6);
            animation: spin 24s linear infinite;
        }

        .disc.spin {
            animation-play-state: running;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .disc-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 1px solid rgba(0, 243, 255, .08);
            box-shadow: 0 0 60px rgba(0, 243, 255, .06);
            pointer-events: none;
        }

        .info {
            text-align: center;
            margin-bottom: 28px;
        }

        .info .h {
            font-size: 1.35rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .info .sub {
            font-size: .8rem;
            color: var(--text-dim);
            margin-top: 6px;
            letter-spacing: 1.5px;
        }

        .info .sub i {
            color: var(--neon-pink);
            font-style: normal;
            margin: 0 8px;
        }

        .prog {
            width: 100%;
            max-width: 520px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .prog .tm {
            font-size: .7rem;
            min-width: 36px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .bar-wrap {
            flex: 1;
            background: rgba(255, 255, 255, .06);
            height: 4px;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            position: relative;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            ;
            box-shadow: 0 0 8px rgba(0, 243, 255, .35);
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: -4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            opacity: 0;
            transition: .2s;
        }

        .bar-wrap:hover .bar-fill::after {
            opacity: 1;
        }

        .ctrls {
            display: flex;
            align-items: center;
            gap: 22px;
            margin-bottom: 18px;
        }

        .cbtn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.3rem;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: .2s;
            font-family: inherit;
        }

        .vol {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 260px;
        }

        .vol span {
            font-size: .75rem;
            color: var(--text-dim);
        }

        .vbar {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, .06);
            ;
            cursor: pointer;
            border-radius: 2px;
        }

        .vfill {
            height: 100%;
            width: 70%;
            background-color: var(--neon-cyan);
            border-radius: 2px;
        }

        .pop {
            position: relative;
            background: #0f0f16;
            border: 1px solid rgba(0, 243, 255, .2);
            border-radius: 8px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 999;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .6);
        }

        .pop.show {
            display: flex;
        }
    </style>
</head>

<body>
    <audio id="audio"></audio>
    <!--左侧-->
    <div class="sidebar">
        <div class="top-bar">
            <div class="brand">
                <img src="图标3.png" alt="logo" class="brand-logo">
                <span class="glitch-text" data-text="音乐都市">音乐都市</span>
            </div>
            <div class="badge">● 在线</div>
        </div>
        <div class="now-card" id="nowCard">
            <div class="vis" id="viz"><i></i><i></i><i></i><i></i></div>
            <div class="now-mate">
                <div class="now-title" id="now-title">等待数据接入...</div>
                <div class="now-artist" id="now-artist">...</div>
            </div>
            <div class="now-time" id="now-time">0:00 / 0:00</div>
        </div>
        <div class="search-wrap">
            <span class="search-ico">⌕</span>
            <input type="text" id="searchInp" placeholder="检索神经音频..." autocomplete="off">
            <button id="clearSearch">✕</button>
        </div>
        <div class="dir-bar" id="dirBar"></div>

        <div class="drop-area" id="dropArea">
            <div><img src="file.png" alt="default" class="file-logo"> 拖拽音频文件至此</div>
            <div class="import-btns">
                <button class="import-btn" id="btnSelectFiles">添加单曲</button>
                <button class="import-btn" id="btnSelectDir">添加文件夹</button>
            </div>
            <input type="file" id="fileInp" multiple accept="audio/*" style="display: none">
            <input type="file" id="dirInp" multiple webkitdirectory style="display: none;">
        </div>
        <div class="list-head">
            <span>◉ 播放列表</span>
            <span id="listStat">0 首歌曲</span>
        </div>
        <div class="scroll-list" id="listBox">
            <div class="empty">等待神经连接</div>
        </div>
    </div>

    <!--右侧-->
    <div class="main">
        <div class="sys-line">NEURAL AUDIO SYSTEM</div>
        <!--唱片-->
        <div class="disc-box">
            <div class="disc-ring"></div>
            <img id="cover" class="disc spin" src="music.png" alt="Album Cover"></img>
        </div>
        <!--歌曲-->
        <div class="info">
            <div class="h" id="mainTitle">NO SIGNAL</div>
            <div class="sub" id="mainArtist">System Idle <i>//</i> SYNTHWAVE</div>
        </div>
        <!-- 进度条 -->
        <div class="prog">
            <span class="tm" id="curT"></span>
            <div class="bar-wrap" id="barWrap">
                <div class="bar-fill" id="barFill"></div>
            </div>
            <span class="tm" id="durT"></span>
        </div>
        <div class="ctrls">
            <button class="cbtn" id="btnShuffle">⇄</button>
            <button class="cbtn" id="btnPrev">◄◄</button>
            <button class="cbtn big" id="btnPlay">▶</button>
            <button class="cbtn" id="btnNext">►►</button>
            <button class="cbtn" id="btnLoop">↻</button>
        </div>
        <div class="vol">
            <span>◖</span>
            <div class="vbar" id="vbar">
                <div class="vfill" id="vfill"></div>
            </div>
            <span>◗</span>
        </div>
    </div>
    <div class="pop" id="popMune"></div>
    <script>
        //基础变量
        var library = [],dirs = [];
        var curDir = 'all';
        var kw = '';
        var curIdx = -1;
        var currentAudioUrl = null,currentCoverUrl = null;
        //状态变量
        var mode = 'list';
        var isShuffle = false, isLoop = false;
        //DOM元素
        const audio = document.getElementById('audio');
        const defaultCover = 'music.png';
        function sig(f) {
            return `${f.name}_${f.size}`;
        }
        function parseName(fn) {
            var n = fn.replace(/\.(mp3|aac|flac|wav|ogg)$/i, '');
            if (n.includes(' - ')) {
                const p = n.split(' - ');
                return { artist: p[0].trim(), title: p.slice(1).join('-').trim() };
            }
            return { artist: '未知艺术家', title: n.trim() };
        }
        function esc(s) {
            return s ? s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;') : '';
        }
        function fmt(t) {
            if (isNaN(t)) return '00:00';
            const m = Math.floor(t / 60), s = Math.floor(t % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
        function filtered() {
            var f = [...library];
            if (curDir != 'all') {
                f = f.filter(s => s.directoryId === curDir);
            };
            if (kw.trim()) {
                const w = kw.trim().toLowerCase();
                f = f.filter(s => s.name.toLowerCase().includes(w) || s.artist.toLowerCase().includes(w))
            };
            return f;
        }
        function countDir(did) {
            return library.filter(s => s.directoryId === did).length;
        }
        //DB打开与后续处理的基础函数
        const dbname = 'CyberAudioDB', dbver = 2,song = 'songs',dir = 'dirs';
        function openDB() {
            return new Promise((resolve, reject) => {
                const r = indexedDB.open(dbname, dbver);
                r.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(song))
                    {
                        db.createObjectStore(song,{keyPath:'id'});
                    }
                    if (!db.objectStoreNames.contains(dir))
                    {
                        db.createObjectStore(dir,{keyPath: 'id'});
                    }
                };
                r.onsuccess = e => resolve(e.target.result);
                r.onerror = e => reject(e.target.error);
            }
            )
        }
        async function savesong(s) {
            const db = await openDB();
            return new Promise((resolve,reject) =>{
                const t = db.transaction(song,'readwrite');
                t.objectStore(song).put({
                    id: s.id,
                    signature: s.signature,
                    name: s.name,
                    artist: s.artist,
                    originalFileName: s.originalFileName,
                    directoryId: s.directoryId,
                    file: s.file
                })
                t.oncomplete = resolve;
                t.onerror = e => reject(e.target.error);
            }
            )    
        }
        async function loadSongs() {
            const db = await openDB();
            return new Promise((resolve,reject) => {
                const r = db.transaction(song,'readonly').objectStore(song).getAll();
                r.onsuccess = e => {
                const out = e.target.result.map(item =>({
                    id: item.id,
                    signature: item.signature || '',
                    name: item.name,
                    artist: item.artist,
                    originalFileName: item.originalFileName,
                    directoryId: item.directoryId,
                    file: item.file
                }));
                resolve(out);
            };
            r.onerror = e => reject(e.target.error);
            })
        }
        async function updateSongDir(id,dirId) {
            const db = await openDB();
            return new Promise((res,rej) =>
        {
            const t = db.transaction(song,'readwrite'),st = t.objectStore(song);
            const g = st.get(id);
           g.onsuccess = ()=> {
            const d = g.result;
            if(d)
           {
            d.directoryId = dirId;
            st.put(d);
           }
           res();
           };
           g.onerror = e =>rej(e.target.error);
        });
        }
        async function delSong(id) {
            const db = await openDB();
            return new Promise((res,rej) =>
        {
            const t = db.transaction(song,'readwrite');
            t.objectStore(song).delete(id);
            t.oncomplete = res;
            t.onerror = e => rej(e.target.error);
        });
        }
        async function saveDirs(dirs) {
            const db = await openDB();
            return new Promise((res,rej) =>
        {
            const t = db.transaction(dir,'readwrite');
            const st = t.objectStore(dir);
            st.clear();
            dirs.forEach(d => {
                st.put(d);
            });
            t.oncomplete = res;
            t.onerror = e => rej(e.target.error);
        });
        }
        async function loadDirs() {
            const db = await openDB();
            return new Promise((res,rej) =>
        {
            const t = db.transaction(dir,'readonly');
            const st = t.objectStore(dir);
            const req = st.getAll();
            req.onsuccess = e => res(e.target.result);
            req.onerror = e => rej(e.target.error);
        });
        }
        //封面提取函数
        function extractCover(file)
        {
            return new Promise((resolve) =>
                {
                    if(typeof jsmediatags === 'undefined')
                {
                    resolve(null);
                    return;
                }
                jsmediatags.read(file,{
                    onSuccess: (tag) =>
                {
                    if(tag.tags && tag.tags.picture)
                    {
                        const pic = tag.tags.picture;
                        const blob = new Blob([new Uint8Array(pic.data)], { type: pic.format });
                        resolve(URL.createObjectURL(blob));
                    } else{
                        resolve(null);
                    }
                },
                onError: () => resolve(null)
                })
                }
            );
        }
        //网页ui渲染函数
        function renderDirs()
        {
            var html = `<div class = "dir-chip ${curDir === 'all' ? 'on' : ''}" data-d = "all"> <img src="file.png" alt="default" class="file-logo">全部<span style="opacity:.7">${library.length}</span></div>`;
            dirs.forEach(d =>
                {
                    const c = countDir(d.id);
                    html += `<div class = "dir-chip ${curDir === d.id ? 'on' : ''}" data-d = "${d.id}"> <img src="file.png" alt="default" class="file-logo">${esc(d.name)}<span style="opacity:.7">${c}</span></div>`;
                }
            );
            html += `<button class="add-dir" id="addDir">+</button>`;
            document.getElementById('dirBar').innerHTML = html;
        }
        document.getElementById('dirBar').addEventListener('click',e=>{
            const del = e.target.closest('.del');
            const iron = e.target.closest('.dir-chip');
            const adddirs = e.target.closest('#addDir');
            if(del)
        {
            delDir(del.dataset.del);
        }
        else if(iron)
        {
            curDir = iron.dataset.d;
            kw = '';
            document.getElementById('searchInp').value = '';
            renderDirs();
            renderList();
            updateStat();
        }
        else if(adddirs)
        {
            const n = prompt('新目录名称');
            if (!n || !n.trim()) return;
            if(dirs.some(d => d.name === n.trim())) return alert('该目录已存在');
            dirs.push({id: 'dir_' + Date.now(), name: n.trim() });
            saveDirs(dirs);
            renderDirs();
        }
        });
        function renderList()
        {
            const f = filtered();
            const box = document.getElementById('listBox');
            document.getElementById('listStat').textContent = `${f.length} 首曲目`;

            if(!f.length)
        {
            box.innerHTML = '<div class="empty">该目录下无神经信号</div>';
            return;
        }
        var h = '';
        f.forEach((s,idx) =>
    {
        const gidx = library.findIndex(x => x.id === s.id);
        const active = gidx === curIdx;
        const dname = curDir === 'all' ? (dirs.find(d => d.id === s.directoryId)?.name || '未分类') : '';
        h += `<div class = "row ${active ? 'on' : ''}" data-g ="${gidx}" data-id= "${s.id}">
            <div class="num">${idx + 1}</div>
            <div class="t">
            <div class="title">${esc(s.name)}</div>
            <div class="sub">${esc(s.artist)}${dname ? ' · ' + esc(dname) : ''}</div>
            </div>
            <div class="acts">
                <button class="mv" title="移动"><img src="file.png" alt="default" class="file-logo"></button>
                <button class="rm" title="删除">🗑</button>
            </div>
        </div>`;
    });
        box.innerHTML = h;
        }

    //播放核心函数等等
    async function playByIndex(i) {
        if(!library.length) return;
        if(i<0) i = 0;
        if(i >= library.length) i = library.length -1;
        const song = library[i];
        if(!song || !song.file) return;
        
        if(currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
        currentAudioUrl = URL.createObjectURL(song.file);
        audio.src = currentAudioUrl;

        document.getElementById('mainTitle').textContent = esc(song.name);
        document.getElementById('mainArtist').textContent = esc(song.artist);
        document.getElementById('nowTitle').textContent = esc(song.name);
        document.getElementById('nowArtist').textContent = esc(song.artist);

        curIdx = i;

         const coverEl = document.getElementById('cover');
        coverEl.src = defaultCover;
        if (currentCoverUrl) {
            URL.revokeObjectURL(currentCoverUrl);
            currentCoverUrl = null;
            }
        extractCover(song.file).then(coverUrl => {
            if(curIdx === i && coverUrl)
        {
            currentCoverUrl = coverUrl;
            coverEl.src = coverUrl;
        }
        else if(coverUrl)
        {
            URL.revokeObjectURL(coverUrl);
        }
        });
        await audio.play().catch(e => console.log('播放失败',e));
        updatePlayBtn();
        renderList();
        saveState();
    }


    //init 函数主进程
    async function init() {
        if(!window.indexedDB) iDbok = false;
        try{
        if(loadDirs.length)
    {
        dirs = loadDirs;
    }else{
        dirs = [{id: 'default',name: '未分类'}];
        await saveDirs(dirs);
    }
        library = await loadSongs();
        renderDirs();
        renderList();
        updateStat();
        restorState();
        }
        catch(e)
        {
            console.warn('IndexdB 错误');
        }
    }

    </script>
